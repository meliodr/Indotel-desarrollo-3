name: indotel-release

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: indotel-release-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "${MSSQL_PID}"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - sqlserver_backups:/var/opt/mssql/backup
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  core:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.core
    image: indotel/core:${RELEASE_TAG}
    container_name: indotel-release-core
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=IndotelCoreDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True"
      Jwt__Issuer: Indotel.Core
      Jwt__Audience: Indotel.Clients
      Jwt__Key: "${JWT_KEY}"
      Jwt__AccessTokenMinutes: "${JWT_ACCESS_TOKEN_MINUTES}"
      Jwt__RefreshTokenDays: "${JWT_REFRESH_TOKEN_DAYS}"
      SeedData__Enabled: "${SEED_DATA_ENABLED}"
      SeedData__AdminEmail: "${ADMIN_EMAIL}"
      SeedData__AdminPassword: "${ADMIN_PASSWORD}"
      Database__ApplyMigrationsOnStartup: "true"
      Database__ConnectRetryCount: "5"
      Database__ConnectRetryIntervalSeconds: "3"
      Database__CommandTimeoutSeconds: "60"
      Cors__AllowedOrigins__0: "https://${INDOTEL_DOMAIN}:${HTTPS_PORT}"
      Security__ExposeResetTokenInResponse: "false"
    volumes:
      - core_uploads:/app/uploads
    networks:
      - backend
    depends_on:
      sqlserver:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    image: indotel/gateway:${RELEASE_TAG}
    container_name: indotel-release-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Gateway__CoreBaseUrl: http://core:8080
      Gateway__ConnectTimeoutSeconds: "5"
      Gateway__RequestTimeoutSeconds: "30"
      Gateway__RetryCount: "2"
      Gateway__CircuitFailureThreshold: "5"
      Gateway__CircuitOpenSeconds: "30"
      Gateway__RateLimitPermit: "${GATEWAY_RATE_LIMIT_PERMIT}"
      Gateway__RateLimitWindowSeconds: "60"
      Gateway__MaxRequestBodyBytes: "52428800"
      Cors__AllowedOrigins__0: "https://${INDOTEL_DOMAIN}:${HTTPS_PORT}"
    networks:
      - backend
      - frontend
    depends_on:
      core:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    image: indotel/web:${RELEASE_TAG}
    container_name: indotel-release-web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApiSettings__GatewayBaseUrl: http://gateway:8080
      Security__DataProtectionKeysPath: /app/.data-protection-keys
    volumes:
      - web_data_protection:/app/.data-protection-keys
    networks:
      - frontend
    depends_on:
      gateway:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    container_name: indotel-release-caddy
    restart: unless-stopped
    environment:
      INDOTEL_DOMAIN: "${INDOTEL_DOMAIN}"
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend
    depends_on:
      web:
        condition: service_healthy
      gateway:
        condition: service_healthy

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  sqlserver_data:
  sqlserver_backups:
  core_uploads:
  web_data_protection:
  caddy_data:
  caddy_config:
