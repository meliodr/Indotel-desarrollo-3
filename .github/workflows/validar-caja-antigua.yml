name: Validar integración con Caja antigua

on:
  push:
    branches: [integracion-caja-antigua, main]
  pull_request:
    branches: [integracion-caja-antigua, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preparar-y-validar-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout de la integración
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restaurar Core
        run: dotnet restore "core-indotel/Indotel.Core.sln"

      - name: Compilar Core
        run: dotnet build "core-indotel/Indotel.Core.sln" --configuration Release --no-restore

      - name: Probar Core
        run: dotnet test "core-indotel/Indotel.Core.Tests/Indotel.Core.Tests.csproj" --configuration Release --no-build

      - name: Verificar contrato de la Caja antigua
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq 'https://localhost:7085/' 'INDOTEL_CAJA(REAL)/Clases/Servicios/ApiClient.cs'
          grep -Fq 'https://localhost:7085;http://localhost:5085' 'core-indotel/Indotel.Core/Properties/launchSettings.json'
          grep -Fq '[HttpGet("cedula/{cedula}")]' 'core-indotel/Indotel.Core/Controllers/LegacyCajaCompatibilityController.cs'
          grep -Fq '"/api/auth/login"' 'INDOTEL_CAJA(REAL)/Clases/Servicios/ServicioAuth.cs'
          grep -Fq '"/api/reclamaciones/cedula/"' 'INDOTEL_CAJA(REAL)/Clases/Servicios/ServicioReclamaciones.cs'

  compilar-caja-antigua:
    needs: preparar-y-validar-core
    runs-on: windows-latest
    outputs:
      codigo: ${{ steps.compilar_caja.outputs.codigo }}
      diagnostico: ${{ steps.compilar_caja.outputs.diagnostico }}

    steps:
      - name: Checkout de la integración
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}

      - name: Instalar Developer Pack .NET Framework 4.8.1
        shell: pwsh
        run: choco install netfx-4.8.1-devpack -y --no-progress

      - name: Configurar MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restaurar paquetes NuGet de Caja
        shell: pwsh
        run: nuget restore "INDOTEL_CAJA(REAL)\packages.config" -PackagesDirectory "INDOTEL_CAJA(REAL)\packages" -NonInteractive

      - name: Compilar Caja antigua
        id: compilar_caja
        shell: pwsh
        run: |
          $codigo = 999
          $lineas = @(
            "PROYECTO=INDOTEL_CAJA(REAL)/INDOTEL_CAJA(REAL).csproj"
            "FRAMEWORK=.NET Framework 4.8.1"
            ""
          )

          try {
            New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null

            $msbuild = (Get-Command msbuild.exe -ErrorAction Stop).Source
            $inicio = [System.Diagnostics.ProcessStartInfo]::new()
            $inicio.FileName = $msbuild
            $inicio.UseShellExecute = $false
            $inicio.CreateNoWindow = $true
            $inicio.ArgumentList.Add("INDOTEL_CAJA(REAL)\INDOTEL_CAJA(REAL).csproj")
            $inicio.ArgumentList.Add("/m")
            $inicio.ArgumentList.Add("/p:Configuration=Release")
            $inicio.ArgumentList.Add("/p:Platform=AnyCPU")
            $inicio.ArgumentList.Add("/verbosity:minimal")
            $inicio.ArgumentList.Add("/fl")
            $inicio.ArgumentList.Add("/flp:logfile=artifacts\caja-msbuild.log;verbosity=diagnostic")

            $proceso = [System.Diagnostics.Process]::Start($inicio)
            $proceso.WaitForExit()
            $codigo = $proceso.ExitCode
            $lineas += "RESULTADO_MSBUILD=$codigo"
            $lineas += ""

            if (Test-Path "artifacts\caja-msbuild.log") {
              $errores = Select-String -Path "artifacts\caja-msbuild.log" -Pattern ": error ", " error CS", " error MSB" -SimpleMatch
              if ($errores) {
                $lineas += $errores.Line | Sort-Object -Unique
              } elseif ($codigo -eq 0) {
                $lineas += "COMPILACION_EXITOSA"
              } else {
                $lineas += Get-Content "artifacts\caja-msbuild.log" -Tail 80
              }
            } elseif ($codigo -eq 0) {
              $lineas += "COMPILACION_EXITOSA_SIN_LOG"
            } else {
              $lineas += "MSBuild terminó con error y no produjo el registro esperado."
            }
          }
          catch {
            $codigo = 998
            $lineas += "RESULTADO_MSBUILD=$codigo"
            $lineas += "EXCEPCION_DURANTE_VALIDACION"
            $lineas += $_.Exception.ToString()
            if (Test-Path "artifacts\caja-msbuild.log") {
              $lineas += ""
              $lineas += "ULTIMAS_LINEAS_MSBUILD:"
              $lineas += Get-Content "artifacts\caja-msbuild.log" -Tail 80
            }
          }
          finally {
            $texto = $lineas -join "`n"
            $base64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($texto))
            "codigo=$codigo" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "diagnostico=$base64" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Se exportó el diagnóstico con código $codigo."
          }

      - name: Verificar ejecutable cuando compile
        if: steps.compilar_caja.outputs.codigo == '0'
        shell: pwsh
        run: |
          $exe = Get-ChildItem "INDOTEL_CAJA(REAL)\bin\Release" -Filter "*.exe" -File | Select-Object -First 1
          if (-not $exe) {
            throw "MSBuild terminó sin errores, pero no se encontró el ejecutable de Caja."
          }
          Write-Host "Caja compilada: $($exe.FullName)"

  mostrar-diagnostico-caja:
    needs: compilar-caja-antigua
    if: always()
    runs-on: ubuntu-latest
    env:
      CODIGO_MSBUILD: ${{ needs.compilar-caja-antigua.outputs.codigo }}
      DIAGNOSTICO_BASE64: ${{ needs.compilar-caja-antigua.outputs.diagnostico }}

    steps:
      - name: Resultado de compilación de la Caja antigua
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import os

          valor = os.environ.get("DIAGNOSTICO_BASE64", "")
          if valor:
              print(base64.b64decode(valor).decode("utf-8", errors="replace"))
          else:
              print("No se recibió el diagnóstico de MSBuild.")
          PY

          if [ "${CODIGO_MSBUILD:-1}" != "0" ]; then
            exit 1
          fi
