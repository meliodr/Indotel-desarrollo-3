name: Core INDOTEL CI

on:
  push:
    branches:
      - core
  pull_request:
    branches:
      - core

jobs:
  build-and-test-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Core
        run: dotnet restore core-indotel/Indotel.Core/Indotel.Core.csproj

      - name: Restore tests
        run: dotnet restore core-indotel/Indotel.Core.Tests/Indotel.Core.Tests.csproj

      - name: Build Core
        run: dotnet build core-indotel/Indotel.Core/Indotel.Core.csproj --configuration Release --no-restore

      - name: Test Core
        run: dotnet test core-indotel/Indotel.Core.Tests/Indotel.Core.Tests.csproj --configuration Release --no-restore --verbosity normal
